name: Deploy Frontend

on:
    push:
        branches: [main]
        paths:
            - "frontend/**"
            - ".github/workflows/deploy.yml"
    workflow_dispatch:

permissions:
    contents: read
    actions: read

concurrency:
    group: deploy-frontend-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v6

            - name: Install pnpm
              run: npm install -g pnpm

            - name: Cache pnpm modules
              uses: actions/cache@v4
              with:
                  path: |
                      frontend/node_modules
                      ~/.pnpm-store
                  key: ${{ runner.os }}-pnpm

            - name: Install frontend dependencies
              run: pnpm install

            - name: Build frontend
              run: pnpm build

            - name: Upload frontend dist
              uses: actions/upload-artifact@v4
              with:
                  name: frontend-dist
                  path: frontend/dist/
                  retention-days: 1

    deploy:
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Download frontend dist
              uses: actions/download-artifact@v4
              with:
                  name: frontend-dist
                  path: ./dist

            - name: Setup SSH
              run: |
                  mkdir -p ~/.ssh
                  echo "$SERVER_SSH_KEY" > ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519
                  chmod 700 ~/.ssh
                  ssh-keyscan -p 9999 $SERVER_IP >> ~/.ssh/known_hosts
                  echo "SSH directory contents:"
                  ls -la ~/.ssh
                  echo "Private key fingerprint:"
                  ssh-keygen -lf ~/.ssh/id_ed25519
              shell: bash
              env:
                  SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
                  SERVER_IP: ${{ secrets.SERVER_IP }}

            - name: Deploy frontend to server
              run: |
                  # Test SSH connection with verbose output
                  ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o LogLevel=VERBOSE -p 9999 root@$SERVER_IP "echo 'SSH connection successful'"

                  # Prepare temp directory for frontend deployment
                  ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -p 9999 root@$SERVER_IP "rm -rf /www/tools.tnzzz.top_tmp && mkdir -p /www/tools.tnzzz.top_tmp"

                  # Upload built frontend files to temp directory
                  rsync -avz -e "ssh -i ~/.ssh/id_ed25519 -p 9999 -o StrictHostKeyChecking=no" dist/ root@$SERVER_IP:/www/tools.tnzzz.top_tmp/

                  # Swap temp directory into place
                  ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -p 9999 root@$SERVER_IP "rm -rf /www/tools.tnzzz.top_prev || true && if [ -d /www/tools.tnzzz.top ]; then mv /www/tools.tnzzz.top /www/tools.tnzzz.top_prev; fi && mv /www/tools.tnzzz.top_tmp /www/tools.tnzzz.top"
              env:
                  SERVER_IP: ${{ secrets.SERVER_IP }}
